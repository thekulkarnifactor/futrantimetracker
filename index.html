<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synced Shift Dashboard</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: var(--text-sub); margin-bottom: 16px; }
        .status-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge { padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .bg-not_started { background: #475569; color: #cbd5e1; }
        .bg-active { background: #16a34a; color: #dcfce7; }
        .bg-on_break { background: #ca8a04; color: #fef9c3; }
        .bg-completed { background: #1d4ed8; color: #dbeafe; }
        .time-display { text-align: center; margin: 12px 0; }
        .time-banner { font-size: 36px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
        .countdown-text { font-size: 13px; color: var(--text-sub); font-weight: 600; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        button { padding: 16px; font-size: 14px; font-weight: 700; color: #ffffff; border: none; border-radius: 12px; cursor: pointer; }
        button:disabled { background-color: #334155 !important; color: #64748b !important; }
        .btn-in { background-color: var(--primary); }
        .btn-break { background-color: var(--warning); color: #451a03; }
        .btn-back { background-color: var(--success); }
        .btn-off { background-color: var(--danger); grid-column: span 2; }
        .metrics-list { background-color: rgba(15, 23, 42, 0.4); border-radius: 12px; padding: 12px 16px; margin-top: 16px; }
        .metric-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
        .metric-row:last-child { border: none; }
        .metric-row span { color: var(--text-sub); }
        .metric-row strong { color: var(--text-main); }
        .sync-indicator { text-align: center; font-size: 11px; color: var(--text-sub); margin-top: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <div class="status-wrapper">
            <div>
                <h2>Synced Shift Controller</h2>
                <div style="font-size: 12px; color: var(--text-sub);">Real-time Cloud Tracking</div>
            </div>
            <div id="statusBadge" class="badge bg-not_started">Loading...</div>
        </div>

        <div class="time-display">
            <div id="timeBanner" class="time-banner">--:-- --</div>
            <div id="countdownText" class="countdown-text">Syncing with cloud database...</div>
        </div>

        <div class="btn-grid">
            <button id="btnIn" class="btn-in" onclick="punchIn()">☀️ First In</button>
            <button id="btnBreak" class="btn-break" onclick="goBreak()">☕ Go Break</button>
            <button id="btnBack" class="btn-back" onclick="returnBreak()">💻 Back In</button>
            <button id="btnLogoff" class="btn-off" onclick="logOff()">🏁 Log Off Day</button>
        </div>

        <div class="metrics-list">
            <div class="metric-row"><span>Arrival Clock</span><strong id="lblFirstIn">--:--</strong></div>
            <div class="metric-row"><span>Break Gaps</span><strong id="lblBreakTime">0 mins</strong></div>
            <div class="metric-row"><span>Active Logged</span><strong id="lblActiveHrs">0h 0m</strong></div>
        </div>
        <div id="syncStatus" class="sync-indicator">Checking cloud connection...</div>
    </div>
</div>

<script>
    // --- CONFIGURE YOUR SUPABASE DETAILS HERE ---
    const SUPABASE_URL = "https://ouqeqgmgwcdesezpitlo.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91cWVxZ21nd2NkZXNlenBpdGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDk5NjAsImV4cCI6MjA5NTk4NTk2MH0.x-GI2NFVVKuw3_BBjVvFTWdk7MhBce1okeWdxTflgV4";
    
    const targetActiveMinutes = 7 * 60; 
    let currentState = "NOT_STARTED"; 
    let firstInTime = null;
    let accumulatedActiveMs = 0;
    let accumulatedBreakMs = 0;
    let lastStateChangeTime = null;
    const todayStr = new Date().toDateString();

    // Pull database logs immediately on boot, then query every 10 seconds for phone updates
    loadFromCloud();
    setInterval(loadFromCloud, 10000); 
    setInterval(updateUI, 1000);

    async function saveToCloud() {
        document.getElementById('syncStatus').innerText = "☁️ Saving changes...";
        const payload = {
            current_state: currentState,
            first_in_time: firstInTime ? new Date(firstInTime).toISOString() : null,
            accumulated_active_ms: accumulatedActiveMs,
            accumulated_break_ms: accumulatedBreakMs,
            last_state_change_time: lastStateChangeTime ? new Date(lastStateChangeTime).toISOString() : null,
            date_tracked: todayStr
        };

        try {
            // Check if record exists for today
            const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/tracker_logs?date_tracked=eq.${encodeURIComponent(todayStr)}`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const existing = await checkRes.json();

            let url = `${SUPABASE_URL}/rest/v1/tracker_logs`;
            let method = "POST";

            if (existing && existing.length > 0) {
                url = `${SUPABASE_URL}/rest/v1/tracker_logs?date_tracked=eq.${encodeURIComponent(todayStr)}`;
                method = "PATCH";
            }

            await fetch(url, {
                method: method,
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(payload)
            });
            document.getElementById('syncStatus').innerText = "✅ Synchronized with Cloud";
        } catch (err) {
            document.getElementById('syncStatus').innerText = "❌ Sync Connection Error";
        }
    }

    async function loadFromCloud() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/tracker_logs?date_tracked=eq.${encodeURIComponent(todayStr)}`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            
            if (data && data.length > 0) {
                const log = data[0];
                currentState = log.current_state;
                firstInTime = log.first_in_time ? new Date(log.first_in_time) : null;
                accumulatedActiveMs = parseFloat(log.accumulated_active_ms);
                accumulatedBreakMs = parseFloat(log.accumulated_break_ms);
                lastStateChangeTime = log.last_state_change_time ? new Date(log.last_state_change_time) : null;
                document.getElementById('syncStatus').innerText = "🔗 Cloud Linked";
            } else {
                currentState = "NOT_STARTED";
                document.getElementById('syncStatus').innerText = "☀️ Fresh Shift Waiting";
            }
        } catch (e) {
            document.getElementById('syncStatus').innerText = "⚠️ Offline Mode";
        }
    }

    function punchIn() {
        const now = new Date(); firstInTime = now; lastStateChangeTime = now; currentState = "ACTIVE";
        updateUI(); saveToCloud();
    }

     
    function goBreak() {
        const now = new Date(); accumulatedActiveMs += (now - new Date(lastStateChangeTime)); lastStateChangeTime = now; currentState = "ON_BREAK";
        updateUI(); saveToCloud();
    }

    function returnBreak() {
        const now = new Date(); accumulatedBreakMs += (now - new Date(lastStateChangeTime)); lastStateChangeTime = now; currentState = "ACTIVE";
        updateUI(); saveToCloud();
    }

    function logOff() {
        if(confirm("End shift?")) {
            const now = new Date();
            if (currentState === "ACTIVE") accumulatedActiveMs += (now - new Date(lastStateChangeTime));
            else if (currentState === "ON_BREAK") accumulatedBreakMs += (now - new Date(lastStateChangeTime));
            lastStateChangeTime = now; currentState = "COMPLETED";
            updateUI(); saveToCloud();
        }
    }

    function updateUI() {
        const btnIn = document.getElementById('btnIn'); const btnBreak = document.getElementById('btnBreak');
        const btnBack = document.getElementById('btnBack'); const btnLogoff = document.getElementById('btnLogoff');
        const badge = document.getElementById('statusBadge');
        
        if (currentState === "NOT_STARTED") {
            badge.innerText = "Not Started"; badge.className = "badge bg-not_started";
            btnIn.disabled = false; btnBreak.disabled = true; btnBack.disabled = true; btnLogoff.disabled = true;
            document.getElementById('timeBanner').innerText = "--:-- --";
            document.getElementById('countdownText').innerText = "Tap First In to start tracking";
            return;
        } else if (currentState === "ACTIVE") {
            badge.innerText = "Active"; badge.className = "badge bg-active";
            btnIn.disabled = true; btnBreak.disabled = false; btnBack.disabled = true; btnLogoff.disabled = false;
        } else if (currentState === "ON_BREAK") {
            badge.innerText = "On Break"; badge.className = "badge bg-on_break";
            btnIn.disabled = true; btnBreak.disabled = true; btnBack.disabled = false; btnLogoff.disabled = false;
        } else if (currentState === "COMPLETED") {
            badge.innerText = "Ended"; badge.className = "badge bg-completed";
            btnIn.disabled = true; btnBreak.disabled = true; btnBack.disabled = true; btnLogoff.disabled = true;
        }

        document.getElementById('lblFirstIn').innerText = new Date(firstInTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const now = new Date();
        let currentActiveMs = accumulatedActiveMs; let currentBreakMs = accumulatedBreakMs;
        
        if (currentState === "ACTIVE") currentActiveMs += (now - new Date(lastStateChangeTime));
        else if (currentState === "ON_BREAK") currentBreakMs += (now - new Date(lastStateChangeTime));
        
        const activeMinutes = Math.floor(currentActiveMs / 60000);
        const breakMinutes = Math.floor(currentBreakMs / 60000);
        
        document.getElementById('lblBreakTime').innerText = `${breakMinutes} mins`;
        document.getElementById('lblActiveHrs').innerText = `${Math.floor(activeMinutes / 60)}h ${activeMinutes % 60}m`;
        
        const totalShiftDurationMs = (targetActiveMinutes * 60 * 1000) + currentBreakMs;
        const departureTime = new Date(new Date(firstInTime).getTime() + totalShiftDurationMs);
        
        if (currentState === "COMPLETED") {
            document.getElementById('timeBanner').innerText = "Ended";
            document.getElementById('countdownText').innerText = "Data archived.";
        } else {
            document.getElementById('timeBanner').innerText = departureTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const timeRemainingMs = departureTime - now;
            if (timeRemainingMs <= 0) {
                document.getElementById('countdownText').innerText = "🎉 Goal reached! Safe to leave.";
            } else {
                const remSecs = Math.floor(timeRemainingMs / 1000);
                document.getElementById('countdownText').innerText = `⏱️ Countdown: ${Math.floor(remSecs / 3600)}h ${Math.floor((remSecs % 3600) / 60)}m remaining`;
            }
        }
    }
</script>
</body>
</html>
